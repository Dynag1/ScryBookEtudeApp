name: Build and Push APK to Central F-Droid Store

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Decode App Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '\r\n' | base64 -di > release.keystore

      - name: Build Release APK
        run: ./gradlew assembleRelease

      - name: Checkout Central F-Droid Store
        uses: actions/checkout@v4
        with:
          repository: Dynag1/Dynag1-Fdroid
          token: ${{ secrets.STORE_PAT }}
          path: store-repo

      - name: Push APK and Metadata to Store
        run: |
          # Création de l'arborescence
          mkdir -p store-repo/apks/co.dynag.scrybook
          mkdir -p store-repo/metadata/co.dynag.scrybook/en-US
          mkdir -p store-repo/metadata/co.dynag.scrybook/fr-FR
          
          # Copie des APK
          cp app/build/outputs/apk/release/*.apk store-repo/apks/co.dynag.scrybook/
          
          # Copie des métadonnées Fastlane
          cp -r fastlane/metadata/android/fr-FR/* store-repo/metadata/co.dynag.scrybook/fr-FR/ 2>/dev/null || true
          cp -r fastlane/metadata/android/en-US/* store-repo/metadata/co.dynag.scrybook/en-US/ 2>/dev/null || true
          
          # Push sur le magasin central
          cd store-repo
          git config user.name "App Github Action"
          git config user.email "actions@github.com"
          git add apks/ metadata/
          git commit -m "Mise à jour automatique de l'APK ScryBookEtudeApp" || echo "Rien à commiter"
          git push
