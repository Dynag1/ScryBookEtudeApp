name: Play Store Deployment

on:
  push:
    tags:
      - 'v*' # Trigger on version tags

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE }}" | base64 --decode > release.keystore

      - name: Build Release Bundle (AAB)
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Create Service Account JSON
        run: echo "${{ secrets.PLAY_CONFIG_JSON }}" | base64 --decode > service_account.json
        # Note: If you prefer PASTE the JSON directly (not base64), 
        # use: echo '${{ secrets.PLAY_CONFIG_JSON }}' > service_account.json

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: service_account.json
          packageName: co.dynag.scrybook
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
